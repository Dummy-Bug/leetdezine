site_name: LeetDezine — System Design and Internals
site_url: https://leetdezine.com
site_description: System design concepts, distributed systems internals, and case studies — built for engineers who want to understand how things actually work.

theme:
  name: material
  custom_dir: overrides
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.top
    - navigation.indexes
    - navigation.expand
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

hooks:
  - hooks.py

plugins:
  - search:
      separator: '[\s\-\.]+'
  - social
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      type: date
      exclude:
        - rate-limiter/*
        - back-of-envelope/*
        - unique-id-generator/*
        - url-shortener/*
        - notification-system/*
        - pastebin/*
        - kv-store/*
        - netflix/*
        - whatsapp/*
        - concepts/*
        - fundamentals/*
        - performance-metrics/*
        - service-levels/*
        - availability/*
        - reliability/*
        - scalability/*
        - fault-tolerance/*
        - durability/*
        - concurrency-locking/*
        - security/*
        - state-machines/*
        - nfrs/*
        - caching/*
        - storage-and-databases/*
        - database-types/*
        - messaging/*
        - event-broker/*
        - event-driven-patterns/*
        - data-processing/*
        - distributed-systems/*
        - foundation/*
        - ascent/*
        - expedition/*
        - summit/*
        - battleground/*
        - case-studies/*
        - index.md
        - start-here.md
  - callouts
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true

not_in_nav: |
  case-studies/index.md

extra:
  generator: false
  analytics:
    provider: google
    property: G-KZPQKH7FSK

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/context-nav.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.smartsymbols
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: "#"
      toc_depth: 3

